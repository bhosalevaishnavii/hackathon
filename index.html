<!DOCTYPE html>
<html>
<head>
    <title>HireReady AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1> HireReady AI</h1>
    <p class="subtitle">Your Personal AI Interview Coach</p>

    
    <div class="section">
        <label>Select Role:</label>
        <select id="role">
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>Python Developer</option>
            <option>Full Stack Developer</option>
            <option>.NET Developer</option>
            <option>HR Interview</option>
        </select>
    </div>

    
    <button onclick="startInterview()">🎯 Start Interview</button>

    
    <div class="section">
        <h2>🧠 Interview Question</h2>
        <p id="questionBox">Click "Start Interview" to begin...</p>
    </div>

    
    <div id="loader" style="display:none;">⏳ AI is thinking...</div>

    
    <div class="section">
        <button onclick="startListening()">🎤 Speak Answer</button>
        <textarea id="answer" placeholder="Or type your answer here..."></textarea>
    </div>

    
    <div id="timer">60s</div>

    
    <button onclick="analyzeAnswer()">📊 Analyze Answer</button>

    
    <div class="section">
        <h2>📋 AI Feedback</h2>
        <div id="feedback">Your feedback will appear here...</div>
    </div>

</div>

<script src="script.js"></script>
</body>
    </html>
